  <meta name="twitter:description" content="Le canard prépare son nid. Afreecanard 2026 arrive bientôt : 3 bodegas et concerts à Lacapelle-Marival. 14-16 août.">
  <meta name="twitter:image" content="https://afreecanard.fr/assets/photos/p07.png">

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Heavitas';
      src: url('fonts/Heavitas.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'SuperBoom';
      src: url('fonts/SuperBoom.otf') format('opentype');
      font-weight: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #16265f;
      --blue2:  #18286e;
      --yellow: #ffd11e;
      --cream:  #f4eedb;
      --red:    #c4302b;
    }

    html, body {
      min-height: 100dvh;
      background: var(--blue);
      color: var(--cream);
      font-family: 'Archivo', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page shell ── */
    .cs {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── Background ── */
    .cs__bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .cs__bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('assets/fabric-blue.png');
      opacity: .07;
      background-repeat: repeat;
    }
    .cs__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 35%, rgba(255,209,30,.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 15% 80%, rgba(196,48,43,.06) 0%, transparent 60%);
    }

    /* Stars */
    .cs__star {
      position: absolute;
      border-radius: 50%;
      background: var(--yellow);
      opacity: .18;
    }

    /* ── Main ── */
    .cs__main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: clamp(36px, 7vw, 72px) clamp(20px, 6vw, 60px) clamp(24px, 4vw, 48px);
    }

    /* Logo */
    .cs__logo {
      width: clamp(68px, 15vw, 108px);
      height: auto;
      margin-bottom: clamp(20px, 4vw, 36px);
      opacity: 0;
    }

    /* Duck */
    .cs__duck-wrap {
      opacity: 0;
      margin-bottom: clamp(8px, 2vw, 16px);
    }
    .cs__duck {
      width: clamp(88px, 21vw, 155px);
      height: auto;
      filter: drop-shadow(0 10px 28px rgba(255,209,30,.22));
    }

    /* Eyebrow */
    .cs__eyebrow {
      font-family: 'SuperBoom', cursive;
      font-size: clamp(12px, 2.8vw, 17px);
      color: var(--yellow);
      letter-spacing: .1em;
      text-transform: uppercase;
      opacity: 0;
      margin-bottom: clamp(6px, 1.2vw, 10px);
    }

    /* Headline */
    .cs__headline {
      font-family: 'Heavitas', sans-serif;
      font-size: clamp(52px, 13.5vw, 100px);
      line-height: .93;
      text-transform: uppercase;
      letter-spacing: -.01em;
      color: var(--cream);
      opacity: 0;
      margin-bottom: clamp(22px, 4vw, 36px);
    }
    .cs__headline span {
      display: block;
      color: var(--yellow);
    }

    /* Dates + lieu */
    .cs__info {
      opacity: 0;
      margin-bottom: clamp(28px, 5vw, 48px);
    }
    .cs__dates {
      font-family: 'Heavitas', sans-serif;
      font-size: clamp(20px, 5vw, 32px);
      color: var(--yellow);
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .cs__lieu {
      font-size: clamp(11px, 2.5vw, 14px);
      color: var(--cream);
      opacity: .6;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 600;
    }

    /* ── Countdown ── */
    .cs__countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(6px, 2vw, 16px);
      opacity: 0;
      margin-bottom: clamp(32px, 6vw, 56px);
    }

    .cs__cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .cs__cd-num {
      font-family: 'Heavitas', sans-serif;
      font-size: clamp(30px, 8vw, 58px);
      line-height: 1;
      color: var(--cream);
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,209,30,.15);
      border-radius: 10px;
      min-width: clamp(52px, 13vw, 88px);
      padding: clamp(8px, 1.8vw, 14px) 8px;
      text-align: center;
      transition: color .12s;
    }
    .cs__cd-label {
      font-size: clamp(8px, 1.8vw, 11px);
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--cream);
      opacity: .38;
      font-weight: 700;
    }
    .cs__cd-sep {
      font-family: 'Heavitas', sans-serif;
      font-size: clamp(22px, 5vw, 38px);
      color: var(--yellow);
      opacity: .4;
      margin-top: clamp(4px, 1vw, 8px);
    }

    /* ── Social ── */
    .cs__social {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
    }
    .cs__btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 999px;
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: clamp(13px, 2.8vw, 15px);
      letter-spacing: .04em;
      text-decoration: none;
      transition: transform .18s ease, opacity .18s ease;
    }
    .cs__btn:hover  { transform: translateY(-3px); }
    .cs__btn:active { transform: translateY(0); opacity: .8; }
    .cs__btn--ig {
      background: var(--yellow);
      color: var(--blue);
    }
    .cs__btn--fb {
      background: transparent;
      color: var(--cream);
      border: 1.5px solid rgba(244,238,219,.3);
    }
    .cs__btn--fb:hover { border-color: rgba(244,238,219,.65); }

    /* ── Footer ── */
    .cs__footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 14px clamp(16px, 4vw, 32px);
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .cs__footer p {
      font-size: 11px;
      color: var(--cream);
      opacity: .3;
      letter-spacing: .02em;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatDuck {
      from { transform: translateY(0) rotate(0deg); }
      to   { transform: translateY(-14px) rotate(2.5deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: .12; transform: scale(1); }
      50%       { opacity: .7;  transform: scale(1.5); }
    }
    @keyframes cdFlash {
      0%   { color: var(--cream); }
      35%  { color: var(--yellow); }
      100% { color: var(--cream); }
    }

    @media (prefers-reduced-motion: no-preference) {
      .cs__logo        { animation: fadeUp .55s          ease-out forwards; }
      .cs__duck-wrap   { animation: fadeUp .55s .12s     ease-out forwards; }
      .cs__eyebrow     { animation: fadeUp .5s  .22s     ease-out forwards; }
      .cs__headline    { animation: fadeUp .55s .32s     ease-out forwards; }
      .cs__info        { animation: fadeUp .5s  .44s     ease-out forwards; }
      .cs__countdown   { animation: fadeUp .5s  .56s     ease-out forwards; }
      .cs__social      { animation: fadeUp .5s  .68s     ease-out forwards; }

      .cs__duck        { animation: floatDuck 2.6s ease-in-out infinite alternate; }

      .cs__star        { animation: twinkle var(--dur, 3s) var(--delay, 0s) ease-in-out infinite; }

      .cd-flash        { animation: cdFlash .35s ease; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cs__logo, .cs__duck-wrap, .cs__eyebrow,
      .cs__headline, .cs__info, .cs__countdown, .cs__social {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="cs">

    <!-- Background -->
    <div class="cs__bg" aria-hidden="true">
      <span class="cs__star" style="width:3px;height:3px;top:7%;left:11%;--dur:2.8s;--delay:0s"></span>
      <span class="cs__star" style="width:4px;height:4px;top:14%;left:79%;--dur:3.6s;--delay:.7s"></span>
      <span class="cs__star" style="width:2px;height:2px;top:24%;left:33%;--dur:2.3s;--delay:1.2s"></span>
      <span class="cs__star" style="width:5px;height:5px;top:62%;left:89%;--dur:4.1s;--delay:.3s"></span>
      <span class="cs__star" style="width:3px;height:3px;top:73%;left:5%;--dur:3.2s;--delay:1.8s"></span>
      <span class="cs__star" style="width:2px;height:2px;top:83%;left:56%;--dur:2.7s;--delay:.9s"></span>
      <span class="cs__star" style="width:4px;height:4px;top:41%;left:93%;--dur:3.4s;--delay:.4s"></span>
      <span class="cs__star" style="width:3px;height:3px;top:91%;left:23%;--dur:3.8s;--delay:2.1s"></span>
      <span class="cs__star" style="width:2px;height:2px;top:5%;left:61%;--dur:2.5s;--delay:1.5s"></span>
      <span class="cs__star" style="width:5px;height:5px;top:53%;left:17%;--dur:4.3s;--delay:.6s"></span>
      <span class="cs__star" style="width:3px;height:3px;top:36%;left:67%;--dur:3.1s;--delay:2.4s"></span>
      <span class="cs__star" style="width:2px;height:2px;top:79%;left:43%;--dur:2.9s;--delay:1.1s"></span>
    </div>

    <!-- Main -->
    <main class="cs__main" id="main-content">

      <img src="assets/logo-jaune.png" alt="Afreecanard" class="cs__logo" width="108" height="108">

      <div class="cs__duck-wrap" aria-hidden="true">
        <img src="assets/canard-micro.png" alt="" class="cs__duck" width="155" height="200">
      </div>

      <p class="cs__eyebrow">Le canard prépare son nid...</p>

      <h1 class="cs__headline">
        Ça arrive<br>
        <span>bientôt</span>
      </h1>

      <div class="cs__info">
        <p class="cs__dates">14 · 15 · 16 août 2026</p>
        <p class="cs__lieu">Prairie du Château · Lacapelle-Marival, Lot</p>
      </div>

      <div class="cs__countdown"
           role="timer"
           aria-label="Compte à rebours avant l'Afreecanard 2026"
           aria-live="off">
        <div class="cs__cd-unit">
          <span class="cs__cd-num" id="cd-days">--</span>
          <span class="cs__cd-label" aria-hidden="true">jours</span>
        </div>
        <span class="cs__cd-sep" aria-hidden="true">·</span>
        <div class="cs__cd-unit">
          <span class="cs__cd-num" id="cd-hours">--</span>
          <span class="cs__cd-label" aria-hidden="true">heures</span>
        </div>
        <span class="cs__cd-sep" aria-hidden="true">·</span>
        <div class="cs__cd-unit">
          <span class="cs__cd-num" id="cd-min">--</span>
          <span class="cs__cd-label" aria-hidden="true">min</span>
        </div>
        <span class="cs__cd-sep" aria-hidden="true">·</span>
        <div class="cs__cd-unit">
          <span class="cs__cd-num" id="cd-sec">--</span>
          <span class="cs__cd-label" aria-hidden="true">sec</span>
        </div>
      </div>

      <div class="cs__social">
        <a href="https://www.instagram.com/afreecanard/"
           target="_blank"
           rel="noopener noreferrer"
           class="cs__btn cs__btn--ig"
           aria-label="Afreecanard sur Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
               aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="6"/>
            <circle cx="12" cy="12" r="4.2"/>
            <circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
          @afreecanard
        </a>
        <a href="https://www.facebook.com/afreecanard"
           target="_blank"
           rel="noopener noreferrer"
           class="cs__btn cs__btn--fb"
           aria-label="Afreecanard sur Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
               aria-hidden="true">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
          Facebook
        </a>
      </div>

    </main>

    <footer class="cs__footer">
      <p>L'abus d'alcool est dangereux pour la santé. À consommer avec modération.</p>
    </footer>

  </div>

  <script>
    (function () {
      var TARGET = new Date('2026-08-14T19:00:00+02:00');
      var dEl = document.getElementById('cd-days');
      var hEl = document.getElementById('cd-hours');
      var mEl = document.getElementById('cd-min');
      var sEl = document.getElementById('cd-sec');
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function pad(n) { return String(n).padStart(2, '0'); }

      function flash(el) {
        if (reduced) return;
        el.classList.remove('cd-flash');
        void el.offsetWidth;
        el.classList.add('cd-flash');
      }

      var prevSec = -1;

      function update() {
        var diff = Math.max(0, TARGET - Date.now());
        var days  = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins  = Math.floor((diff % 3600000) / 60000);
        var secs  = Math.floor((diff % 60000) / 1000);

        dEl.textContent = pad(days);
        hEl.textContent = pad(hours);
        mEl.textContent = pad(mins);

        if (secs !== prevSec) {
          sEl.textContent = pad(secs);
          flash(sEl);
          if (secs === 0) {
            flash(mEl);
            if (mins === 0) {
              flash(hEl);
              if (hours === 0) flash(dEl);
            }
          }
          prevSec = secs;
        }
      }

      update();
      setInterval(update, 250);
    })();
  </script>
</body>
</html>
